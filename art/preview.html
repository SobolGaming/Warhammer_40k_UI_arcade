<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Warhammer-style HUD SVG Icons Preview</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; padding: 32px; background: #101216; color: #f2e6c4; font-family: Arial, Helvetica, sans-serif; }
  h1 { margin: 0 0 8px; font-size: 24px; }
  p { margin: 0 0 24px; color: #b8b0a0; }
  .grid { display: grid; grid-template-columns: repeat(3, minmax(160px, 1fr)); gap: 18px; max-width: 800px; }
  .card { background: #191d24; border: 1px solid #3f4654; border-radius: 14px; padding: 18px; text-align: center; }
  .card svg { width: 112px; height: 112px; }
  .label { font-weight: 700; margin-top: 10px; }
  .p1 { color: #d1a642; }
  .p2 { color: #58a6ff; }
  .p3 { color: #da5f55; }
</style>
</head>
<body>
<h1>Warhammer-style HUD SVG Icons</h1>
<p>All icons use <code>currentColor</code>, so player color can be changed with CSS.</p>
<div class="grid">
<div class="card"><svg class="p1" xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <title>Score icon</title>
  <desc>Warhammer-inspired score icon with star and laurel</desc>
  <g stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M64 6 L96 14 L114 32 V94 L96 112 L64 122 L32 112 L14 94 V32 L32 14 Z"/>
    <path opacity="0.55" d="M64 18 L86 24 L102 40 V86 L86 102 L64 110 L42 102 L26 86 V40 L42 24 Z"/>
  </g>

  <g stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M44 80 C34 72, 31 57, 37 44"/>
    <path d="M84 80 C94 72, 97 57, 91 44"/>
    <path d="M40 69 l-8 -3"/>
    <path d="M38 58 l-9 0"/>
    <path d="M40 48 l-8 3"/>
    <path d="M88 69 l8 -3"/>
    <path d="M90 58 l9 0"/>
    <path d="M88 48 l8 3"/>
    <path d="M64 35 l6 13 14 2 -10 10 2 14 -12 -7 -12 7 2 -14 -10 -10 14 -2 z" fill="currentColor" stroke="none"/>
    <circle cx="64" cy="58" r="3" fill="white" stroke="none"/>
  </g>
</svg>
<div class="label">Score</div></div>
<div class="card"><svg class="p2" xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <title>Command points icon</title>

    <path d="M64 6 L96 14 L114 32 V94 L96 112 L64 122 L32 112 L14 94 V32 L32 14 Z"/>
    <path opacity="0.55" d="M64 18 L86 24 L102 40 V86 L86 102 L64 110 L42 102 L26 86 V40 L42 24 Z"/>
  </g>

  <g stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M64 34 L79 40 L86 55 L79 70 L64 76 L49 70 L42 55 L49 40 Z"/>

    <path d="M46 84 H82" opacity="0.7"/>
  </g>
</svg>
<div class="label">CP</div></div>
<div class="card"><svg class="p3" xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <title>Round icon</title>

</body>
</html>
