schema_version: 1
profile_id: command_bench_hud
layout_preset: command_bench
theme: default
regions:
  top_ribbon:
    widget:
      type: HudContainer
      id: command_bench_top_ribbon
      render_mode: none
      layout: {kind: grid, columns: 4, gap_px: 8, padding_px: 4}
      children:
      - type: StatusChip
        id: command_bench_phase_chip
        data_ref: phase_state
        label: Phase
      - type: StatusChip
        id: command_bench_active_player_chip
        data_ref: active_player
        label: Active
      - type: StatusChip
        id: command_points_chip
        data_ref: command_points
        label: CP
      - type: ActionButton
        id: summary_toggle_button
        command_id: toggle_action_summary
        icon_id: action.summary
        label: Summary
  left_player_bench:
    widget:
      type: HudContainer
      id: player_bench_root
      render_mode: none
      layout: {kind: stack, orientation: vertical, gap_px: 8, padding_px: 8}
      children:
      - type: IconTextBar
        id: player_bench_title
        icon_id: entity.unit
        primary_label: Player Bench
      - type: UnitRailCard
        id: player_bench_roster
        data_ref: player_roster
        unit_label: Player roster
  right_opponent_bench:
    widget:
      type: HudContainer
      id: opponent_bench_root
      render_mode: none
      layout: {kind: stack, orientation: vertical, gap_px: 8, padding_px: 8}
      children:
      - type: IconTextBar
        id: opponent_bench_title
        icon_id: entity.unit
        primary_label: Opponent Bench
      - type: UnitRailCard
        id: opponent_bench_roster
        data_ref: opponent_roster
        unit_label: Opponent roster
        color_role: opponent
  bottom_command_bench:
    widget:
      type: HudContainer
      id: command_bench_workbench_root
      render_mode: none
      layout: {kind: stack, orientation: horizontal, gap_px: 8, padding_px: 8}
      children:
      - type: HudContainer
        id: command_bench_action_column
        render_mode: none
        width: 33%
        layout: {kind: stack, orientation: vertical, gap_px: 8, padding_px: 0}
        children:
        - type: AssignmentGroupRow
          id: command_bench_assignment_row
          data_ref: hud.workbench.assignments.groups
          group_label: Current Assignment
          button_height: 44
          button_gap: 6
        - type: CurrentActionPanel
          id: command_bench_current_action_panel
          data_ref: current_action
          title: Current Action
          button_shape: rect
          button_height: 34
          button_min_width: 98
          button_gap: 6
      - type: DiceTray
        id: command_bench_dice_tray
        data_ref: dice_tray
        title: Dice Tray
        width: fill
        face_icon_size: 28
        max_visible_dice_per_face: 6
        show_source: true
