schema_version: 1
profile_id: unit_datasheet_preview
layout_preset: compass_ring
theme: default
sample_data:
  selected_unit:
    name: Intercessor Squad Alpha
    subtitle: Battleline infantry
    status: 5 models, ready to move
    stats:
      M: 6
      T: 4
      SV: 3+
      W: 2
      LD: 6+
      OC: 2
  current_assignment:
    label: Movement assignments
    summary: 3 assigned, 2 no-op
regions:
  right_inspector:
    widget:
      type: HudContainer
      id: datasheet_preview_root
      render_mode: panel
      layout: {kind: stack, orientation: vertical, gap_px: 10, padding_px: 10}
      children:
      - type: DatasheetPanel
        id: selected_unit_datasheet
        data_ref: selected_unit
        density: detailed
        title: Selected Unit
        stat_cell_height: 42
      - type: AssignmentGroupRow
        id: assignment_summary_row
        data_ref: current_assignment
        group_label: Movement Assignment
        operation_kind: movement
