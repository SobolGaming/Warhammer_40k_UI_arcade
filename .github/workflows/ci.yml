name: ci

"on":
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Warhammer_40k_UI_arcade
    steps:
      - name: Checkout UI repository
        uses: actions/checkout@v4
        with:
          path: Warhammer_40k_UI_arcade

      - name: Checkout core engine repository
        uses: actions/checkout@v4
        with:
          repository: SobolGaming/Warhammer_40k_AI
          path: Warhammer_40k_AI
          token: ${{ secrets.CORE_REPO_TOKEN || github.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14.5

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src tests

      - name: Pyright
        run: uv run pyright

      - name: Pre-commit hooks
        run: uv run pre-commit run --all-files

  tests:
    name: tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Warhammer_40k_UI_arcade
    steps:
      - name: Checkout UI repository
        uses: actions/checkout@v4
        with:
          path: Warhammer_40k_UI_arcade

      - name: Checkout core engine repository
        uses: actions/checkout@v4
        with:
          repository: SobolGaming/Warhammer_40k_AI
          path: Warhammer_40k_AI
          token: ${{ secrets.CORE_REPO_TOKEN || github.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14.5

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Run tests
        run: uv run pytest
