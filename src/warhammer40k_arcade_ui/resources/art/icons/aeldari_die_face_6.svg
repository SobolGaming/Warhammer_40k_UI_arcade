<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc" class="aeldari-die" color="#000000">
  <title id="title">Aeldari themed die face 6</title>
  <desc id="desc">A monochrome vector die face showing 6 Aeldari-inspired rune pips. Edit the root color attribute or set CSS color to recolor the currentColor pips.</desc>
  <style>
  .pip { fill: currentColor; }
</style>
  <defs>
  <g id="aeldari-pip" class="pip">
    <!-- Outer spirit-stone ring with transparent center -->
    <path fill-rule="evenodd" d="
      M 0 -160
      C 58 -102 84 -48 84 8
      C 84 72 47 118 0 160
      C -47 118 -84 72 -84 8
      C -84 -48 -58 -102 0 -160 Z

      M 0 -116
      C 35 -72 52 -29 52 9
      C 52 56 27 92 0 122
      C -27 92 -52 56 -52 9
      C -52 -29 -35 -72 0 -116 Z
    "/>

    <!-- Inner wraithbone/rune blade, also with a transparent center -->
    <path fill-rule="evenodd" d="
      M 0 -128
      C 25 -72 40 -27 40 8
      C 40 55 22 96 0 138
      C -22 96 -40 55 -40 8
      C -40 -27 -25 -72 0 -128 Z

      M 0 -82
      C 12 -47 20 -17 20 9
      C 20 39 10 66 0 94
      C -10 66 -20 39 -20 9
      C -20 -17 -12 -47 0 -82 Z
    "/>
  </g>
</defs>
  <rect class="die-background" x="0" y="0" width="1024" height="1024" fill="none"/>
  <g aria-label="die face 6">
    <use href="#aeldari-pip" transform="translate(286 246) scale(0.72)"/>
    <use href="#aeldari-pip" transform="translate(738 246) scale(0.72)"/>
    <use href="#aeldari-pip" transform="translate(286 512) scale(0.72)"/>
    <use href="#aeldari-pip" transform="translate(738 512) scale(0.72)"/>
    <use href="#aeldari-pip" transform="translate(286 778) scale(0.72)"/>
    <use href="#aeldari-pip" transform="translate(738 778) scale(0.72)"/>
  </g>
</svg>
