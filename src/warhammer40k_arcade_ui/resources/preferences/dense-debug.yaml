schema_version: '1'
profile_name: dense-debug
overlays:
  default_on_model_selection:
  - selected_model
  - coherency
  - engagement_range
  default_on_unit_selection:
  - selected_unit
  - objective_control_context
  - cover
  default_on_movement_draft:
  - movement_path_draft
  - movement_budget
  - coherency
  enabled_by_default:
  - debug_coordinates
hotkeys:
- command_id: cancel
  key: escape
  modifiers: []
- command_id: confirm
  key: enter
  modifiers: []
- command_id: cycle_selection
  key: tab
  modifiers: []
- command_id: open_selected_unit_actions
  key: space
  modifiers: []
- command_id: cycle_entity_layer
  key: l
  modifiers: []
- command_id: select_current_entity_group
  key: g
  modifiers: []
- command_id: add_entity_selection
  key: a
  modifiers:
  - shift
- command_id: subtract_entity_selection
  key: s
  modifiers:
  - shift
- command_id: toggle_entity_selection
  key: t
  modifiers:
  - shift
- command_id: toggle_overlay
  key: b
  modifiers: []
  overlay_id: movement_budget
- command_id: toggle_measure_mode
  key: r
  modifiers: []
- command_id: toggle_action_summary
  key: v
  modifiers: []
- command_id: review_action_summary
  key: v
  modifiers:
  - shift
selection:
  default_mouse_button: left
  cycle_overlapping_bases: true
hud:
  layout_preset: compass_ring
  composition_profile: default-hud
  zones:
    top_ribbon:
      visible: true
      size_px: 84
      collapsed: false
    left_rail:
      visible: true
      size_px: 224
      collapsed: false
    right_inspector:
      visible: true
      size_px: 276
      collapsed: false
    bottom_workbench:
      visible: true
      size_px: 156
      collapsed: false
    left_player_bench:
      visible: true
      size_px: 240
      collapsed: false
    right_opponent_bench:
      visible: true
      size_px: 240
      collapsed: false
    bottom_command_bench:
      visible: true
      size_px: 220
      collapsed: false
  show_phase: true
  show_active_player: true
  show_event_log: true
  show_config_diagnostics: true
  show_assignment_hud: true
  assignment_hud_mode: detailed
  show_assignment_warning_markers: true
  action_summary_default: review
  action_summary_max_labels: 10
  show_chain_breadcrumbs: true
  text_scale: 0.9
  high_contrast: true
experimental:
  planned_settings:
    hud.minimap_enabled: true
    render.cached_text_objects: true
extensions: {}
